name: DB types drift

# Fail if a migration changed the schema without the generated types being
# refreshed (`npm run db:types`). Kept OUT of the main CI gate so it can't block
# a PR on missing Supabase credentials: the drift script self-skips (exit 0)
# unless SUPABASE_PROJECT_ID + SUPABASE_ACCESS_TOKEN are configured as secrets.
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'src/types/database.generated.ts'
      - 'scripts/check-db-types.mjs'

jobs:
  drift:
    name: generated types match schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check generated DB types
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npm run db:types:check
