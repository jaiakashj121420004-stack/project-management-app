name: CI

# Gate every push and PR on the full quality bar: types, lint, tests, and a
# production build. Mirrors the local `npm run` scripts so "green in CI" means
# the same thing as "green on my machine".
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so only the latest commit's CI matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build
