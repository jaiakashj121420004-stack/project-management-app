<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Single dynamic theme-color, kept in sync with the active theme by applyTheme(). -->
    <meta name="theme-color" content="#181210" id="theme-color" />
    <meta
      name="description"
      content="Aurora — a modern project-management app with boards, calendar, notes, and collaboration."
    />

    <!-- Nvexis type: Fraunces (display) · Spectral (body) · IBM Plex Mono (figures). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,600&family=IBM+Plex+Mono:wght@500;600&display=swap"
    />

    <!-- PWA icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#7A2A26" />

    <!-- iOS standalone (home-screen) hints -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aurora" />

    <title>Aurora</title>
    <!-- Set the theme class before first paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('aurora-theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = stored === 'dark' || stored === 'light' ? stored : prefersLight ? 'light' : 'dark';
          document.documentElement.classList.remove('dark', 'light');
          document.documentElement.classList.add(theme);
          var meta = document.getElementById('theme-color');
          if (meta) meta.setAttribute('content', theme === 'light' ? '#ECE4D6' : '#181210');
        } catch (e) {
          /* keep the default dark class */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
