<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Single dynamic theme-color, kept in sync with the active theme by applyTheme(). -->
    <meta name="theme-color" content="#181210" id="theme-color" />
    <meta
      name="description"
      content="Aurora — a modern project-management app with boards, calendar, notes, and collaboration."
    />

    <!-- Nvexis type: Fraunces (display) · Spectral (body) · IBM Plex Mono (figures). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,600&family=IBM+Plex+Mono:wght@500;600&display=swap"
    />

    <!-- PWA icons — Aurora A-monogram (vector source: public/brand/aurora-*.svg) -->
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#7A2A26" />

    <!-- iOS standalone (home-screen) hints -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aurora" />

    <title>Aurora</title>
    <!-- Set the theme class before first paint to avoid a flash of the wrong theme.
         External (not inline) so the CSP can keep a strict `script-src 'self'`.
         Render-blocking in <head>, so it still runs before first paint. -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root">
      <!--
        Static fallback content, visible only until React mounts and replaces it
        (createRoot overwrites these children on first render). Exists so that
        crawlers which don't execute JavaScript — e.g. Google OAuth branding
        verification — see real text describing the app, not an empty shell.
      -->
      <main style="font-family: Georgia, serif; max-width: 40rem; margin: 4rem auto; padding: 0 1.5rem; color: #ECE4D6; background: #181210;">
        <h1>Aurora</h1>
        <p>Aurora, by Nvexis, is a modern project-management workspace: Kanban boards, a
          Notion-style block editor, an infinite collaborative canvas, a calendar, notes,
          and daily to-dos — installable on every device and synced in real time.</p>
        <p><a href="/privacy" style="color:#C24A40;">Privacy Policy</a> ·
           <a href="/terms" style="color:#C24A40;">Terms of Service</a></p>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
